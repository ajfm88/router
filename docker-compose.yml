services:
  app:
    build: .
    container_name: router-dev
    stdin_open: true
    tty: true
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PHP_CS_FIXER_IGNORE_ENV=1
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - vendor:/app/vendor
    command: ["php", "-S", "0.0.0.0:8080", "-t", "sample"]

volumes:
  vendor:
